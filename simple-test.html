<!DOCTYPE html>
<html>
<head>
    <title>Simple Google Apps Script Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h1>Google Apps Script Connection Test</h1>
    <div id="results"></div>
    
    <button onclick="testBasicConnection()">Test Basic Connection</button>
    <button onclick="testDirectURL()">Test Direct URL Access</button>
    
    <script>
        const URL = 'https://script.google.com/macros/s/AKfycbxRYd4jlGrMngfhbbSSCvx8nY6t8h0Ht0Pv7WS5_Lm7KqlHUnkhUGzclnceAuDkem7v3w/exec'; // UPDATE THIS AFTER NEW DEPLOYMENT
        
        function log(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}</strong>: ${message}`;
            results.appendChild(div);
        }
        
        function testBasicConnection() {
            log('Testing basic connection to Google Apps Script...', 'info');
            
            // Test with no parameters first
            const img = new Image();
            img.onload = function() {
                log('✅ Basic connection successful!', 'success');
            };
            img.onerror = function() {
                log('❌ Basic connection failed - deployment may not be accessible', 'error');
            };
            img.src = URL + '?t=' + Date.now();
        }
        
        function testDirectURL() {
            log('Testing direct URL access...', 'info');
            
            // Try to access the URL directly
            fetch(URL + '?action=test&apiKey=nvc2026secretkey', {
                method: 'GET',
                mode: 'no-cors'
            })
            .then(() => {
                log('✅ URL accessible (no-cors mode)', 'success');
            })
            .catch(error => {
                log('❌ URL not accessible: ' + error.message, 'error');
                log('Possible issues:', 'info');
                log('1. Deployment is not published as web app', 'info');
                log('2. doGet function is missing or has errors', 'info');
                log('3. Script permissions are not properly set', 'info');
                log('4. Deployment needs to be re-published', 'info');
            });
        }
    </script>
</body>
</html>
