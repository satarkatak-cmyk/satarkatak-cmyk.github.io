<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Laboratory Test Form - Example</title>
    <style>
        body { font-family: 'Noto Sans Devanagari', sans-serif; margin: 20px; line-height: 1.6; }
        .form-container { max-width: 800px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin-right: 10px; }
        button:hover { background-color: #0056b3; }
        .success { color: green; margin-top: 10px; }
        .error { color: red; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2> Laboratory Test Entry Form</h2>
        <form id="labTestForm">
            <div class="form-group">
                <label for="sampleNumber"> Sample Number:</label>
                <input type="text" id="sampleNumber" name="sampleNumber" required>
            </div>
            
            <div class="form-group">
                <label for="sampleReceivedDate"> Sample Received Date:</label>
                <input type="date" id="sampleReceivedDate" name="sampleReceivedDate" required>
            </div>
            
            <div class="form-group">
                <label for="testRequester"> Test Requester:</label>
                <input type="text" id="testRequester" name="testRequester" required>
            </div>
            
            <div class="form-group">
                <label for="organizationName"> Organization Name:</label>
                <input type="text" id="organizationName" name="organizationName" required>
            </div>
            
            <div class="form-group">
                <label for="ministry"> Ministry/Agency:</label>
                <input type="text" id="ministry" name="ministry" required>
            </div>
            
            <div class="form-group">
                <label for="testMaterial"> Test Material:</label>
                <input type="text" id="testMaterial" name="testMaterial" required>
            </div>
            
            <div class="form-group">
                <label for="testDate"> Test Date:</label>
                <input type="date" id="testDate" name="testDate" required>
            </div>
            
            <div class="form-group">
                <label for="testMethod"> Test Method:</label>
                <input type="text" id="testMethod" name="testMethod" required>
            </div>
            
            <div class="form-group">
                <label for="testEquipment"> Test Equipment:</label>
                <input type="text" id="testEquipment" name="testEquipment" required>
            </div>
            
            <div class="form-group">
                <label for="testResult"> Test Result:</label>
                <textarea id="testResult" name="testResult" rows="3" required></textarea>
            </div>
            
            <div class="form-group">
                <label for="remarks"> Remarks:</label>
                <textarea id="remarks" name="remarks" rows="2"></textarea>
            </div>
            
            <button type="submit">Save Test Data</button>
            <button type="button" onclick="loadTests()">Load Existing Tests</button>
        </form>
        
        <div id="message"></div>
        
        <div id="testList" style="margin-top: 30px;"></div>
    </div>

    <!-- Include the existing API and configuration files -->
    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="state.js"></script>
    
    <script>
        // Initialize form
        document.getElementById('labTestForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const testData = {};
            
            // Convert form data to object
            for (let [key, value] of formData.entries()) {
                testData[key] = value;
            }
            
            try {
                // Save to Google Sheets using the API function
                const result = await NVC.Api.saveLaboratoryTestToGoogleSheets(testData);
                
                const messageDiv = document.getElementById('message');
                if (result.success) {
                    messageDiv.innerHTML = `<div class="success"> Test saved successfully! ID: ${result.id}</div>`;
                    this.reset();
                    loadTests(); // Refresh the list
                } else {
                    messageDiv.innerHTML = `<div class="error"> Error: ${result.message}</div>`;
                }
            } catch (error) {
                document.getElementById('message').innerHTML = `<div class="error"> Error: ${error.message}</div>`;
            }
        });

        // Load existing tests
        async function loadTests() {
            try {
                const result = await NVC.Api.getLaboratoryTestsFromGoogleSheets();
                const testListDiv = document.getElementById('testList');
                
                if (result.success && result.data.length > 0) {
                    let html = '<h3>Existing Laboratory Tests</h3><table border="1" style="width: 100%; border-collapse: collapse;">';
                    html += '<tr style="background-color: #f2f2f2;">';
                    html += '<th>Sample No.</th><th>Received Date</th><th>Requester</th><th>Organization</th><th>Test Date</th><th>Result</th><th>Actions</th>';
                    html += '</tr>';
                    
                    result.data.forEach(test => {
                        html += '<tr>';
                        html += `<td>${test.sampleNumber || ''}</td>`;
                        html += `<td>${test.sampleReceivedDate || ''}</td>`;
                        html += `<td>${test.testRequester || ''}</td>`;
                        html += `<td>${test.organizationName || ''}</td>`;
                        html += `<td>${test.testDate || ''}</td>`;
                        html += `<td>${test.testResult || ''}</td>`;
                        html += `<td><button onclick="deleteTest('${test.id}')">Delete</button></td>`;
                        html += '</tr>';
                    });
                    
                    html += '</table>';
                    testListDiv.innerHTML = html;
                } else {
                    testListDiv.innerHTML = '<p>No laboratory tests found.</p>';
                }
            } catch (error) {
                document.getElementById('testList').innerHTML = `<p class="error">Error loading tests: ${error.message}</p>`;
            }
        }

        // Delete a test
        async function deleteTest(testId) {
            if (confirm('Are you sure you want to delete this test?')) {
                try {
                    const result = await NVC.Api.deleteLaboratoryTestFromGoogleSheets(testId);
                    if (result.success) {
                        document.getElementById('message').innerHTML = '<div class="success">Test deleted successfully!</div>';
                        loadTests(); // Refresh the list
                    } else {
                        document.getElementById('message').innerHTML = `<div class="error">Error: ${result.message}</div>`;
                    }
                } catch (error) {
                    document.getElementById('message').innerHTML = `<div class="error">Error: ${error.message}</div>`;
                }
            }
        }

        // Load tests when page loads
        window.addEventListener('load', function() {
            // Check if NVC API is available
            if (typeof NVC === 'undefined' || !NVC.Api) {
                document.getElementById('message').innerHTML = '<div class="error">Error: NVC API not loaded. Please check configuration.</div>';
            } else {
                loadTests();
            }
        });
    </script>
</body>
</html>
